# --- GLOBAL CATCH-ALL RULE LAST ---
# WHY floating + fullscreen on every new window (see move-to-workspace comment above).
# Specific rules above run first; this catches everything else on open.
[[on-window-detected]]
run = ['layout floating', 'fullscreen on --no-outer-gaps']
