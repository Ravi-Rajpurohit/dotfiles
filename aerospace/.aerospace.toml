# Managed via Stow: ~/dotfiles/aerospace → ~/.aerospace.toml

config-version = 2

# Start AeroSpace at login
start-at-login = true

# auto-reload-config is in main-branch docs but not released yet (0.20.3).
# Reload manually: service mode (ctrl-alt-cmd-;) → esc, or `aerospace reload-config`.

# You can use it to add commands that run after AeroSpace startup.
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = []

# Workspaces that stay alive even when empty or invisible (requires config-version = 2)
persistent-workspaces = ["1", "2", "8", "9"]


# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true


# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'


# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 0
inner.vertical =   0
outer.left =       0
outer.bottom =     0
outer.top =        0
outer.right =      0

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # alt-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
ctrl-alt-cmd-left = 'focus left'
ctrl-alt-cmd-down = 'focus down'
ctrl-alt-cmd-up = 'focus up'
ctrl-alt-cmd-right = 'focus right'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
ctrl-alt-cmd-shift-left = 'move left'
ctrl-alt-cmd-shift-down = 'move down'
ctrl-alt-cmd-shift-up = 'move up'
ctrl-alt-cmd-shift-right = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
ctrl-alt-cmd-1 = 'workspace 1'
ctrl-alt-cmd-2 = 'workspace 2'
# ctrl-alt-cmd-3 = 'workspace 3'

ctrl-alt-cmd-8 = 'workspace 8'
ctrl-alt-cmd-9 = 'workspace 9'

# --- App/launcher shortcuts ---
# Hyper = ctrl-alt-cmd (remapped globally via Raycast; all shortcuts below use that key)
ctrl-alt-cmd-a = 'exec-and-forget open -b com.openai.chat'
ctrl-alt-cmd-b = 'exec-and-forget open -b com.google.Chrome'
ctrl-alt-cmd-shift-c = 'exec-and-forget open -b com.apple.iCal'
ctrl-alt-cmd-c = 'exec-and-forget open -b com.google.Chrome.app.kjbdgfilnfhdoflbpgamdcdgpehopbep'
ctrl-alt-cmd-e = 'exec-and-forget open -b com.apple.finder'
ctrl-alt-cmd-f = 'exec-and-forget open -b com.figma.Desktop'
ctrl-alt-cmd-g = 'exec-and-forget open -b com.google.Chrome.app.mjoklplbddabcmpepnokjaffbmgbkkgg'
ctrl-alt-cmd-l = 'exec-and-forget open -b com.linear'
ctrl-alt-cmd-m = 'exec-and-forget open -b com.apple.mail'
ctrl-alt-cmd-d = 'exec-and-forget open -b com.mongodb.compass'
ctrl-alt-cmd-o = 'exec-and-forget open "obsidian://open?vault=Work"'
ctrl-alt-cmd-shift-o = 'exec-and-forget open "obsidian://open?vault=Personal"'
ctrl-alt-cmd-q = 'exec-and-forget open -b com.apple.QuickTimePlayerX'
ctrl-alt-cmd-r = 'exec-and-forget open -b io.skyhook.radar' # Radar
ctrl-alt-cmd-shift-r = 'exec-and-forget open -b app.freelens.Freelens' # Freelens
ctrl-alt-cmd-s = 'exec-and-forget open -b com.tinyspeck.slackmacgap'
ctrl-alt-cmd-t = 'exec-and-forget open -b com.googlecode.iterm2'
ctrl-alt-cmd-v = 'exec-and-forget open -b com.todesktop.230313mzl4w4u92' #cursor
ctrl-alt-cmd-shift-v = 'exec-and-forget open -b com.microsoft.VSCode'
# ctrl-alt-cmd-shift-v = 'exec-and-forget open -b com.microsoft.VSCodeInsiders'
ctrl-alt-cmd-y = 'exec-and-forget open -b net.imput.helium.app.cinhimbnkkaeohfgghhklpknlkffjgod' # YouTube Music (Helium)
ctrl-alt-cmd-z = 'exec-and-forget open -b app.zen-browser.zen'


# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
# WHY floating + aerospace fullscreen (not either alone, not macos-native-fullscreen):
# - `layout floating` — one window per workspace, no tile splits; window stays draggable/focusable
# - `fullscreen on` — aerospace maximizes that floating window to fill the monitor; traffic lights stay visible
# - NOT `macos-native-fullscreen` — hides title bar/close button and creates a separate Space (ctrl-alt-cmd-f11 only)
# - `on` not bare `fullscreen` — idempotent on repeat moves; `--no-outer-gaps` — edge-to-edge fill
ctrl-alt-cmd-shift-1 = ['move-node-to-workspace 1', 'workspace 1', 'layout floating', 'fullscreen on --no-outer-gaps']
ctrl-alt-cmd-shift-2 = ['move-node-to-workspace 2', 'workspace 2', 'layout floating', 'fullscreen on --no-outer-gaps']
# ctrl-alt-cmd-shift-3 = 'move-node-to-workspace 3'
# ctrl-alt-cmd-shift-7 = 'move-node-to-workspace 7'
ctrl-alt-cmd-shift-8 = ['move-node-to-workspace 8', 'workspace 8', 'layout floating', 'fullscreen on --no-outer-gaps']
ctrl-alt-cmd-shift-9 = ['move-node-to-workspace 9', 'workspace 9', 'layout floating', 'fullscreen on --no-outer-gaps']
# alt-shift-a = 'move-node-to-workspace A'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
alt-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# open aerospace config in vscode
cmd-ctrl-alt-comma = "exec-and-forget cursor --new-window ~/dotfiles ~/.aerospace.toml"

# Escape hatch only — true macOS fullscreen (hides menu bar and traffic lights).
# Default maximize behavior uses aerospace `fullscreen on` everywhere else.
ctrl-alt-cmd-f11 = 'macos-native-fullscreen'

# IMPORTANT
# Fix Mission Control Window Sizes
# Windows show up really small in Mission Control because of how Aerospace hides windows of non active workspaces.
# A workaround for this is to go to System Settings -> Desktop & Dock -> Mission Control and then turn on “Group Windows By Application”.

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
ctrl-alt-cmd-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']

f = ['layout floating', 'fullscreen on --no-outer-gaps', 'mode main']
# shift-f = ['macos-native-fullscreen', 'mode main']

r = ['mode resize']
shift-r = ['flatten-workspace-tree', 'mode main'] # reset layout

t = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout

backspace = ['close-all-windows-but-current', 'mode main']

# sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# down = 'volume down'
# up = 'volume up'
# shift-down = ['volume set 0', 'mode main']

# FIXME: floating resize via AppleScript — top-left anchor quirk (see bin/resize-floating-window.sh).
# TODO: switch arrows to `aerospace resize` when https://github.com/nikitabobko/AeroSpace/issues/9 lands.
[mode.resize.binding]
left  = 'exec-and-forget ~/dotfiles/aerospace/bin/resize-floating-window.sh left'
right = 'exec-and-forget ~/dotfiles/aerospace/bin/resize-floating-window.sh right'
up    = 'exec-and-forget ~/dotfiles/aerospace/bin/resize-floating-window.sh up'
down  = 'exec-and-forget ~/dotfiles/aerospace/bin/resize-floating-window.sh down'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
minus = 'resize smart -50'
equal = 'resize smart +50'

esc = 'mode main'
enter = 'mode main'

# ────────────────
# Workspace to monitor assignments
# ────────────────
[workspace-to-monitor-force-assignment]
1 = 'main'     # Main is the MacBook screen, Secondary is the external monitor
2 = 'secondary'
# 3 = 'main'

8 = 'secondary'
9 = 'main'     # MacBook screen → workspace 9 -> Personal Stuff


